            TO ADD a new game: copy this card block and update the content.
            Also create: games/[game-slug]/privacy.html and games/[game-slug]/support.html
          -->

          <!-- On The Line: Puzzle Game -->
          <div class="game-card">
            <div class="game-card-image">
              <!-- Replace with actual screenshot: <img src="/assets/images/on-the-line.png" alt="On The Line"> -->
              On The Line
            </div>
            <div class="game-card-body">
