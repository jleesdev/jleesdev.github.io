<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="On The Line: Puzzle Game — A minimalist puzzle game by Jongwon Lee">
  <meta name="base-url" content="">
  <title>On The Line — jlee</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .game-hero {
      padding: var(--space-16) 0 var(--space-12);
      border-bottom: 1px solid var(--color-border);
      margin-bottom: var(--space-12);
    }

    .game-hero h1 {
      font-size: var(--text-3xl);
      margin-bottom: var(--space-3);
    }

    .game-hero p {
      color: var(--color-text-muted);
      max-width: 480px;
      margin-bottom: var(--space-8);
    }

    .game-hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      align-items: center;
    }

    .game-link {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-decoration: underline;
      transition: color var(--transition-fast);
    }

    .game-link:hover {
      color: var(--color-accent);
    }

    .game-hero-inner {
      display: flex;
      gap: var(--space-6);
      align-items: flex-start;
    }

    .game-logo {
      width: 88px;
      height: 88px;
      border-radius: var(--radius-lg);
      flex-shrink: 0;
    }

    .screenshots-grid {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-12);
    }

    .screenshots-grid img {
      flex: 1;
      max-width: 320px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
    }

    @media (max-width: 640px) {
      .game-hero-inner {
        flex-direction: column;
      }

      .screenshots-grid {
        gap: var(--space-2);
      }
    }
  </style>
</head>
<body>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <div class="nav-breadcrumb">
        <a href="/" class="nav-logo" aria-label="Home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </a>
        <span class="nav-breadcrumb-sep">/</span>
        <span class="nav-breadcrumb-link">On The Line</span>
      </div>
      <div class="lang-selector">
        <button class="lang-option" data-lang="en">EN</button>
        <button class="lang-option" data-lang="ko">KO</button>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <div class="game-hero">
        <div class="game-hero-inner">
          <img src="/life/on-the-line/ontheline_logo_strawberry.png" alt="On The Line logo" class="game-logo">
          <div>
            <h1>On The Line: Puzzle Game</h1>
            <p style="margin-bottom: 0;" data-i18n="otl.tagline.line1">Move, Line Up, And Clear!</p>
            <p data-i18n="otl.tagline.line2">Simple yet addictive line puzzle game!</p>
            <div class="game-hero-links">
              <a href="https://apps.apple.com/app/id6760333150" target="_blank" rel="noopener noreferrer" class="game-link" data-i18n="games.appstore">App Store</a>
              <a href="/life/on-the-line/privacy.html" class="game-link" data-i18n="games.privacy">Privacy Policy</a>
              <a href="/life/on-the-line/support.html" class="game-link" data-i18n="games.support">Support</a>
            </div>
          </div>
        </div>
      </div>

      <div class="screenshots-grid">
        <img src="/life/on-the-line/IMG_5281.PNG" alt="On The Line gameplay">
        <img src="/life/on-the-line/IMG_5283.PNG" alt="On The Line combo">
        <img src="/life/on-the-line/IMG_5284.PNG" alt="On The Line game over">
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="footer-copy">© <span id="year"></span> Jongwon Lee. <span data-i18n="footer.rights">All rights reserved.</span></span>
      <div class="footer-links">
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/i18n.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
