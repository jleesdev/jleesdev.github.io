<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="On The Line: Puzzle Game — A minimalist puzzle game by Jongwon Lee">
  <meta name="base-url" content="">
  <title>On The Line — jlee</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .game-hero {
      padding: var(--space-16) 0 var(--space-12);
      border-bottom: 1px solid var(--color-border);
      margin-bottom: var(--space-12);
    }

    .game-hero h1 {
      font-size: var(--text-3xl);
      margin-bottom: var(--space-3);
    }

    .game-hero p {
      color: var(--color-text-muted);
      max-width: 480px;
      margin-bottom: var(--space-8);
    }

    .game-hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      align-items: center;
    }

    .game-meta-links {
      display: flex;
      gap: var(--space-5);
      margin-top: var(--space-10);
    }

    .game-meta-links a {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-decoration: underline;
      transition: color var(--transition-fast);
    }

    .game-meta-links a:hover {
      color: var(--color-accent);
    }

    .game-screenshot {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 9/16;
      background: var(--color-bg-subtle);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      margin-bottom: var(--space-12);
    }
  </style>
</head>
<body>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="/" class="nav-logo" aria-label="Home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </a>
      <div class="nav-links">
        <div class="nav-dropdown">
          <button class="nav-dropdown-btn" aria-expanded="false" aria-haspopup="true">
            <span data-i18n="nav.work">Work</span>
            <span class="nav-dropdown-arrow" aria-hidden="true">▾</span>
          </button>
          <div class="nav-dropdown-menu">
            <a href="/work/resume/" data-i18n="nav.resume">Resume</a>
            <a href="/work/portfolio/" data-i18n="nav.portfolio">Portfolio</a>
          </div>
        </div>
        <div class="nav-dropdown">
          <button class="nav-dropdown-btn" aria-expanded="false" aria-haspopup="true">
            <span data-i18n="nav.life">Life</span>
            <span class="nav-dropdown-arrow" aria-hidden="true">▾</span>
          </button>
          <div class="nav-dropdown-menu">
            <a href="/life/on-the-line/">On The Line</a>
          </div>
        </div>
        <button class="lang-toggle" aria-label="Switch language">KO</button>
      </div>
      <button class="nav-mobile-btn" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav-mobile-menu" role="navigation" aria-label="Mobile navigation">
    <div class="mobile-nav-group">
      <div class="mobile-nav-group-label" data-i18n="nav.work">Work</div>
      <a href="/work/resume/" data-i18n="nav.resume">Resume</a>
      <a href="/work/portfolio/" data-i18n="nav.portfolio">Portfolio</a>
    </div>
    <div class="mobile-nav-group">
      <div class="mobile-nav-group-label" data-i18n="nav.life">Life</div>
      <a href="/life/on-the-line/">On The Line</a>
    </div>
    <button class="lang-toggle" aria-label="Switch language">KO</button>
  </div>

  <main>
    <div class="container">

      <div class="breadcrumb">
        <a href="/" aria-label="Home">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </a>
        <span class="breadcrumb-sep">/</span>
        <span>On The Line</span>
      </div>

      <div class="game-hero">
        <h1>On The Line: Puzzle Game</h1>
        <p>A minimalist puzzle game. Draw lines to solve increasingly challenging levels.</p>
        <div class="game-hero-links">
          <a href="https://apps.apple.com/app/id6760333150" target="_blank" rel="noopener noreferrer" class="btn btn-primary" data-i18n="games.appstore">App Store</a>
        </div>
      </div>

      <div class="game-screenshot">
        <!-- Screenshot placeholder — replace with: <img src="/assets/images/on-the-line.png" alt="On The Line gameplay"> -->
        Screenshot
      </div>

      <div class="game-meta-links">
        <a href="/life/on-the-line/privacy.html" data-i18n="games.privacy">Privacy Policy</a>
        <a href="/life/on-the-line/support.html" data-i18n="games.support">Support</a>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="footer-copy">© <span id="year"></span> Jongwon Lee. <span data-i18n="footer.rights">All rights reserved.</span></span>
      <div class="footer-links">
        <a href="/life/on-the-line/privacy.html" data-i18n="games.privacy">Privacy Policy</a>
        <a href="/life/on-the-line/support.html" data-i18n="games.support">Support</a>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/i18n.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
