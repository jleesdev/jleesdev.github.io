<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jongwon Lee — Software Engineer">
  <meta name="base-url" content="">
  <title>Jongwon Lee</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      padding-top: var(--nav-height);
    }

    .home-wrap {
      width: 100%;
      padding: var(--space-20) 0;
    }

    /* ── Name ── */
    .home-name {
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: var(--font-bold);
      letter-spacing: -0.03em;
      line-height: var(--leading-tight);
      margin-bottom: var(--space-2);
    }

    .home-tagline {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      letter-spacing: 0.04em;
      margin-bottom: var(--space-16);
    }

    /* ── Two-column section grid ── */
    .home-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-12);
      max-width: 560px;
    }

    .home-section-label {
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-3);
      border-bottom: 1px solid var(--color-border);
    }

    .home-section-links {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .home-section-links a {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-base);
      font-weight: var(--font-medium);
      color: var(--color-text);
      padding: var(--space-1) 0;
      transition: color var(--transition-fast);
    }

    .home-section-links a::after {
      content: '↗';
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      transition: color var(--transition-fast), transform var(--transition-fast);
    }

    .home-section-links a:hover {
      color: var(--color-accent);
    }

    .home-section-links a:hover::after {
      color: var(--color-accent);
      transform: translate(1px, -1px);
    }

    @media (max-width: 540px) {
      .home-sections {
        grid-template-columns: 1fr;
        gap: var(--space-10);
      }
    }
  </style>
</head>
<body>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="/" class="nav-logo">JL</a>
      <div class="nav-links">
        <a href="/career/resume/" data-i18n="nav.resume">Resume</a>
        <a href="/career/portfolio/" data-i18n="nav.portfolio">Portfolio</a>
        <a href="/life/" data-i18n="nav.life">Life</a>
        <button class="lang-toggle" aria-label="Switch language">KO</button>
      </div>
      <button class="nav-mobile-btn" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav-mobile-menu" role="navigation" aria-label="Mobile navigation">
    <a href="/career/resume/" data-i18n="nav.resume">Resume</a>
    <a href="/career/portfolio/" data-i18n="nav.portfolio">Portfolio</a>
    <a href="/life/" data-i18n="nav.life">Life</a>
    <button class="lang-toggle" aria-label="Switch language">KO</button>
  </div>

  <main>
    <div class="container">
      <div class="home-wrap">

        <h1 class="home-name" data-i18n="hero.name">JONGWON LEE</h1>
        <p class="home-tagline" data-i18n="hero.tagline">Software Engineer</p>

        <div class="home-sections">

          <div class="home-section">
            <div class="home-section-label" data-i18n="home.section.career">Career</div>
            <div class="home-section-links">
              <a href="/career/resume/" data-i18n="nav.resume">Resume</a>
              <a href="/career/portfolio/" data-i18n="nav.portfolio">Portfolio</a>
            </div>
          </div>

          <div class="home-section">
            <div class="home-section-label" data-i18n="home.section.life">Life</div>
            <div class="home-section-links">
              <a href="/life/on-the-line/">On The Line: Puzzle Game</a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="footer-copy">© <span id="year"></span> Jongwon Lee. <span data-i18n="footer.rights">All rights reserved.</span></span>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/%EC%A2%85%EC%9B%90-%EC%9D%B4-597746136/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://github.com/jleesdev" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="/js/main.js"></script>
  <script src="/js/i18n.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
